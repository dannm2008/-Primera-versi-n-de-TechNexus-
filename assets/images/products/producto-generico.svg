<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Producto generico</title>
  <desc id="desc">Ilustracion vectorial generica para productos sin imagen especifica.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#17345f"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8bd1ff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="64" fill="url(#bg)"/>
  <circle cx="250" cy="170" r="190" fill="#5b8cff" opacity="0.15"/>
  <circle cx="980" cy="740" r="240" fill="#ffffff" opacity="0.08"/>
  <g transform="translate(255 150)">
    <rect x="90" y="110" width="510" height="380" rx="34" fill="#0a1020" stroke="#2e5faa" stroke-width="10"/>
    <rect x="130" y="150" width="430" height="220" rx="24" fill="#101b34"/>
    <rect x="175" y="190" width="340" height="140" rx="18" fill="url(#plate)" opacity="0.9"/>
    <circle cx="305" cy="260" r="26" fill="#0a1020" opacity="0.28"/>
    <rect x="45" y="520" width="600" height="52" rx="26" fill="#0a1020"/>
    <rect x="95" y="536" width="500" height="18" rx="9" fill="#8bd1ff" opacity="0.5"/>
  </g>
  <text x="78" y="790" fill="#dcecff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500">Imagen no disponible</text>
</svg>